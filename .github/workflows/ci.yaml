name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-push:
    runs-on: ubuntu-latest # GitHub's runner — has Docker
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4.2.2

      - name: Set up Java 21
        uses: actions/setup-java@v4.7.0
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Build JAR
        run: ./gradlew bootJar
        working-directory: app

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/hello-spring:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/hello-spring:latest

  verify-cluster:
    runs-on: arc-runner-set # self-hosted — has kubectl access
    needs: build-and-push
    if: github.event_name != 'pull_request'

    steps:
      - name: Verify kubectl works
        run: kubectl get pods -n hello-dev

      - name: Check current dev image
        run: |
          kubectl get deployment hello-spring -n hello-dev \
            -o jsonpath='{.spec.template.spec.containers[0].image}'
