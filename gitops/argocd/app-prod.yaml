apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-spring-prod
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/abhijnanacharya/k8s_argo_primer.git
    targetRevision: main
    path: gitops/overlays/prod

  destination:
    server: https://kubernetes.default.svc
    namespace: hello-prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
