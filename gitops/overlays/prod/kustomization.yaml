apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: hello-prod

resources:
  - ../../base

images:
  - name: hello-spring
    newTag: "0.0.1"

patches:
  - target:
      kind: ConfigMap
      name: hello-spring-config
    patch: |-
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: hello-spring-config
      data:
        environment: prod
        message: "Hello from Prod!"

  - target:
      kind: Deployment
      name: hello-spring
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: hello-spring
      spec:
        replicas: 2
